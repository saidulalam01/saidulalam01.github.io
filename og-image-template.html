<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0a0e13;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .glow-right {
    position: absolute;
    width: 650px; height: 650px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,168,48,0.11) 0%, transparent 65%);
    top: -180px; right: -80px;
  }

  .glow-left {
    position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(224,112,32,0.06) 0%, transparent 65%);
    bottom: -120px; left: 80px;
  }

  /* Left gold bar */
  .bar {
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(180deg, transparent 0%, #f0a830 30%, #e07020 70%, transparent 100%);
  }

  /* Top border line */
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,168,48,0.3), transparent);
  }

  /* Bottom border line */
  .bottom-line {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(240,168,48,0.15), transparent);
  }

  .layout {
    position: relative; z-index: 1;
    display: flex;
    height: 100%;
    padding: 52px 68px 52px 76px;
    gap: 56px;
    align-items: center;
  }

  /* ── LEFT ── */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .eyebrow-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #f0a830;
    box-shadow: 0 0 10px rgba(240,168,48,0.7);
    flex-shrink: 0;
  }

  .eyebrow-text {
    font-size: 11px; font-weight: 700;
    color: #f0a830;
    letter-spacing: 3.5px;
    text-transform: uppercase;
  }

  .eyebrow-line {
    height: 1px; flex: 1;
    background: linear-gradient(90deg, rgba(240,168,48,0.25), transparent);
  }

  .name {
    font-size: 56px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -2.5px;
    margin-bottom: 14px;
  }

  .name-top { color: #eaeff4; }

  .name-bottom {
    background: linear-gradient(135deg, #f0a830 0%, #fcd860 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .role {
    font-size: 16px; font-weight: 500;
    color: #6b7888;
    letter-spacing: 0.3px;
    margin-bottom: 32px;
  }

  /* Stats row */
  .stats {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 32px;
    padding: 18px 24px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    width: fit-content;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
  }

  .stat:first-child { padding-left: 0; }
  .stat:last-child { padding-right: 0; }

  .stat-num {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #f0a830, #fcd860);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-label {
    font-size: 10px; font-weight: 600;
    color: #3a4555;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }

  .stat-sep {
    width: 1px; height: 36px;
    background: rgba(255,255,255,0.06);
  }

  /* Tags */
  .tags { display: flex; gap: 7px; flex-wrap: wrap; }

  .tag {
    padding: 5px 13px;
    background: rgba(240,168,48,0.06);
    border: 1px solid rgba(240,168,48,0.16);
    border-radius: 20px;
    color: #c89030;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* ── RIGHT ── */
  .right {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .photo-outer {
    position: relative;
  }

  .photo-ring {
    width: 216px; height: 216px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(145deg, #f0a830, #c86010);
    box-shadow:
      0 0 0 8px rgba(240,168,48,0.06),
      0 0 40px rgba(240,168,48,0.2);
  }

  .photo-ring img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 4px solid #0a0e13;
    display: block;
  }

  .badge {
    position: absolute;
    bottom: 6px; left: 50%; transform: translateX(-50%);
    background: #0f1419;
    border: 1px solid rgba(240,168,48,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 10px; font-weight: 700;
    color: #f0a830;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .divider-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .gold-bar {
    width: 32px; height: 2px;
    background: linear-gradient(90deg, #f0a830, #e07020);
    border-radius: 2px;
  }

  .socials {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .social {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    color: #3a4a5a;
  }

  .social svg { opacity: 0.5; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-right"></div>
  <div class="glow-left"></div>
  <div class="bar"></div>
  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="layout">
    <div class="left">
      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <span class="eyebrow-text">Analytics Engineer</span>
        <div class="eyebrow-line"></div>
      </div>

      <div class="name">
        <div class="name-top">Saidul Alam</div>
        <div class="name-bottom">Rahat</div>
      </div>

      <p class="role">Data Engineering · Business Intelligence · Product Analytics</p>

      <div class="stats">
        <div class="stat">
          <span class="stat-num">3+</span>
          <span class="stat-label">Years</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num">80%</span>
          <span class="stat-label">Less ad-hoc</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-num">30%</span>
          <span class="stat-label">Faster reports</span>
        </div>
      </div>

      <div class="tags">
        <span class="tag">SQL</span>
        <span class="tag">Python</span>
        <span class="tag">R</span>
        <span class="tag">Power BI</span>
        <span class="tag">PostgreSQL</span>
        <span class="tag">Streamlit</span>
        <span class="tag">Looker Studio</span>
      </div>
    </div>

    <div class="right">
      <div class="photo-outer">
        <div class="photo-ring">
          <img src="assets/profile.jpeg" alt="Saidul Alam Rahat">
        </div>
        <div class="badge">Open to New Opportunities</div>
      </div>

      <div class="divider-block">
        <div class="gold-bar"></div>
        <div class="socials">
          <div class="social">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
            in/saidul-alam01
          </div>
          <span style="color:#1e2a36">·</span>
          <div class="social">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            saidulalam01
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
